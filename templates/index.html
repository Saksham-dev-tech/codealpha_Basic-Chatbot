<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Rule-Based Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
        #chat-box { height: 400px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; }
        .message { padding: 10px; border-radius: 5px; max-width: 80%; }
        .user-msg { background-color: #007bff; color: white; align-self: flex-end; }
        .bot-msg { background-color: #e9ecef; color: black; align-self: flex-start; }
        #input-area { display: flex; padding: 10px; background: #fafafa; }
        #user-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        button { padding: 10px 15px; margin-left: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box">
        <div class="message bot-msg">Hello! I am a simple chatbot. Say 'hello' to start!</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (message === "") return;

        // 1. Display user message
        appendMessage(message, "user-msg");
        inputField.value = "";

        // 2. Send message to Python Backend (Input/Output)
        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            // 3. Display bot reply
            appendMessage(data.reply, "bot-msg");
        } catch (error) {
            appendMessage("Server error. Is the backend running?", "bot-msg");
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        
        // Auto-scroll to the bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
